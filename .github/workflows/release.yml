name: Release Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  release:
    name: Build and package VSIX
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Package VSIX
        run: npx vsce package --no-dependencies --out "squeak-peek-${{ github.ref_name }}.vsix"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: squeak-peek-${{ github.ref_name }}
          path: '*.vsix'
          if-no-files-found: error

      - name: Extract changelog for release
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BODY=$(awk -v ver="$VERSION" '
            BEGIN { found=0 }
            /^## \[/ {
              if (found) exit
              if ($0 ~ "^## \\[" ver "\\]") found=1
              next
            }
            found { print }
          ' CHANGELOG.md | sed -e :a -e '/^\n*$/{$d;N;ba' -e '}')
          if [ -z "$BODY" ]; then
            echo "No changelog section found for version $VERSION" >&2
            exit 1
          fi
          {
            echo 'body<<EOF'
            printf '%s\n' "$BODY"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          files: '*.vsix'
